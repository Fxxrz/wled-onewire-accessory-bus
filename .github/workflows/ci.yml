name: Usermod CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  WLED_SHA: e39118333d3d5a9c93286243b3aa227e5ee4a713
  PIO_VERSION: 6.1.19
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Usermod
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: usermod-export
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.9"

      - name: Privacy guard
        working-directory: usermod-export
        run: |
          private_ip='192''\.168\.[0-9]+\.[0-9]+'
          local_path='/''Users/'
          private_forge='git''\.fxrz\.de'
          real_rom='09564208''0A00004C'
          if grep -aRIE "${private_ip}|${local_path}|${private_forge}|${real_rom}" --exclude-dir=.git .; then
            echo "Private development value found in public export"
            exit 1
          fi
          if git show --format=fuller --no-ext-diff HEAD | grep -E "${private_ip}|${local_path}|${private_forge}|${real_rom}"; then
            echo "Private development value found in release commit"
            exit 1
          fi
          if git log --all --format='%ae%n%ce' | grep -Eqv '^[A-Za-z0-9+_.-]+@users\.noreply\.github\.com$'; then
            echo "Non-noreply commit identity found in public history"
            exit 1
          fi
          if git for-each-ref refs/tags --format='%(taggeremail)' \
            | sed -e '/^$/d' -e 's/^<//' -e 's/>$//' \
            | grep -Eqv '^[A-Za-z0-9+_.-]+@users\.noreply\.github\.com$'; then
            echo "Non-noreply annotated-tag identity found in public history"
            exit 1
          fi

      - name: Run executable and source-contract tests
        working-directory: usermod-export
        run: node --test usermods/onewire_accessory_bus/onewire_accessory_bus.test.js tools/release_workflow.test.js

      - name: Check formatting
        working-directory: usermod-export
        run: git --no-pager show --check --format= HEAD

      - name: Install PlatformIO
        run: python -m pip install "platformio==${PIO_VERSION}"

      - name: Check out pinned WLED source
        run: |
          git clone --filter=blob:none https://github.com/Aircoookie/WLED.git WLED
          git -C WLED checkout "${WLED_SHA}"

      - name: Assemble public corresponding source
        run: |
          cp -R usermod-export/usermods/onewire_accessory_bus WLED/usermods/
          cp usermod-export/examples/platformio_override.example.ini WLED/platformio_override.ini

      - name: Build WLED web assets
        working-directory: WLED
        run: |
          npm ci
          npm run build

      - name: Record resolved PlatformIO metadata
        working-directory: WLED
        run: |
          pio project metadata -e esp32dev_onewire_audio --json-output-path "$RUNNER_TEMP/owab-platformio-metadata.json"
          python -c 'import json,sys; json.load(open(sys.argv[1]))' "$RUNNER_TEMP/owab-platformio-metadata.json"

      - name: Build ESP32 AudioReactive integration
        working-directory: WLED
        run: pio run -e esp32dev_onewire_audio

      - name: Restore validated PlatformIO metadata
        working-directory: WLED
        run: cp "$RUNNER_TEMP/owab-platformio-metadata.json" platformio-metadata.json

      - name: Verify linked Usermods
        run: |
          grep -q "onewire_accessory_bus" WLED/.pio/build/esp32dev_onewire_audio/firmware.map
          grep -q "audioreactive" WLED/.pio/build/esp32dev_onewire_audio/firmware.map

      - name: Generate source/build SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: WLED
          format: spdx-json
          output-file: WLED/owab.spdx.json
          upload-artifact: false

      - name: Verify deterministic release packaging
        run: |
          python usermod-export/tools/package_release.py \
            --version ci \
            --wled-tree WLED \
            --metadata WLED/platformio-metadata.json \
            --sbom WLED/owab.spdx.json \
            --esptool "$HOME/.platformio/packages/tool-esptoolpy/esptool.py" \
            --source-remote https://github.com/Fxxrz/wled-onewire-accessory-bus.git \
            --output-dir release-package

      - name: Attest OTA app and release package
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            WLED/.pio/build/esp32dev_onewire_audio/firmware.bin
            release-package/*.zip

      - name: Attest OTA app SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: WLED/.pio/build/esp32dev_onewire_audio/firmware.bin
          sbom-path: WLED/owab.spdx.json

      - name: Upload candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: owab-ci-evidence
          if-no-files-found: error
          path: |
            WLED/.pio/build/esp32dev_onewire_audio/firmware.bin
            WLED/.pio/build/esp32dev_onewire_audio/firmware.elf
            WLED/.pio/build/esp32dev_onewire_audio/firmware.map
            WLED/platformio-metadata.json
            WLED/owab.spdx.json
            release-package/
