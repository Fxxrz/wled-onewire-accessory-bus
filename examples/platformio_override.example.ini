; Generic release-build example for a common 4 MB ESP32 dev board.
; Copy to platformio_override.ini in the pinned WLED checkout.

[platformio]
default_envs = esp32dev_onewire_audio

[env:esp32dev_onewire_audio]
extends = env:esp32dev
custom_usermods =
  audioreactive
  onewire_accessory_bus

; The OneWire GPIO remains runtime-configurable. Do not force GPIO19 in a
; generic release merely because it is the reference hardware assignment.
